<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Display Ascensore</title>
    <style>
        /* RESET GENERALE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* STRUTTURA GRIGLIA SUPERIORE */
        #top-grid {
            display: grid;
            grid-template-columns: 38% 24% 38%;
            width: 100vw;
            height: 32vh;
            border-bottom: 2px solid #333333;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            background: #000000;
        }

        .top-box {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 15px;
            overflow: hidden;
        }

        /* FASCIA SUPERIORE SINISTRA: DATA IN VERDE */
        #orologio-box {
            width: 38%;
            font-size: 1.9rem;
            text-transform: uppercase;
            font-weight: bold;
            line-height: 1.25;
            z-index: 110;
            margin-top: -16px;
            color: #00ff00;
        }

        #santo-box {
            font-size: 1.15rem;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: normal;
        }

        #ricorrenza-box {
            font-size: 1.15rem;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: normal;
            line-height: 1.2;
            white-space: normal;
        }

        /* FASCIA SUPERIORE CENTRALE: ZERO IN GIALLO MAX 25VH */
        #piano-box {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #numero-piano {
            font-size: 25vh;
            font-weight: 900;
            color: #ffff00;
            line-height: 1;
            margin-top: 2mm;
            margin-bottom: 2mm;
            display: inline-block;
            position: relative;
            transform: translateX(-22px);
        }

        #quota-box {
            position: absolute;
            left: calc(50% + 15px);
            font-size: 2.4rem;
            color: #ffffff;
            font-weight: bold;
            white-space: nowrap;
        }

        /* FASCIA SUPERIORE DESTRA */
        #meteo-mini-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-right: 10px;
        }

        #mini-icona {
            width: 75px;
            height: 75px;
        }

        #mini-temp {
            font-size: 3.2rem;
            font-weight: bold;
            color: #ffffff;
        }

        #dati-tecnici-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 1rem;
            color: #ffffff;
            font-weight: bold;
            margin-top: 2px;
            line-height: 1.3;
        }

        .riga-tecnica {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 2px 0;
        }

        /* AREA CENTRALE (REGIA E ANIMAZIONE) */
        #main-content {
            position: absolute;
            top: 32vh;
            left: 0;
            width: 100vw;
            height: 68vh;
            z-index: 10;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            display: flex;
            align-items: center;
        }

        .layer.active {
            opacity: 1;
            z-index: 20;
        }

        /* QUADRO METEO CENTRALE */
        #quadro-meteo {
            display: flex;
            align-items: center;
            padding-left: 5vw;
            width: 100vw;
        }

        #meteo-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 350px;
        }

        #svg-meteo-container {
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #meteo-testo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 3mm;
            text-align: center;
        }

        /* QUADRO FOTO CONDOMINIALE */
        #quadro-foto {
            width: 100vw;
            height: 100%;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        #foto-nas {
            max-width: 90%;
            max-height: 95%;
            object-fit: contain;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 3px solid #333333;
        }

        /* GRANDE FRECCIA CENTRALE */
        #freccia-container {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            width: 160px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .freccia-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.3));
        }
    </style>
</head>
<body>

    <!-- GRIGLIA SUPERIORE -->
    <div id="top-grid">
        <!-- SINISTRA -->
        <div class="top-box" id="orologio-box">
            <div id="testo-data">CARICAMENTO...</div>
            <div id="santo-box">OGGI SI FESTEGGIA: San Vittorio Martire</div>
            <div id="ricorrenza-box">RICORRENZA STORICA DI OGGI:<br>Nessun dato disponibile</div>
        </div>

        <!-- CENTRO -->
        <div class="top-box" id="piano-box">
            <div id="numero-piano">0</div>
            <div id="quota-box">183 mt s.l.m.</div>
        </div>

        <!-- DESTRA -->
        <div class="top-box" style="width:100%;">
            <div id="meteo-mini-box">
                <div id="mini-icona">
                    <svg viewBox="0 0 100 100" width="100%" height="100%">
                        <defs>
                            <radialGradient id="soleGrad2" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#fffb00"/>
                                <stop offset="100%" stop-color="#ff5100"/>
                            </radialGradient>
                            <filter id="sfocatura2">
                                <feGaussianBlur stdDeviation="3" />
                            </filter>
                        </defs>
                        <circle cx="45" cy="45" r="22" fill="url(#soleGrad2)"/>
                        <path d="M 30,55 Q 40,42 55,45 Q 68,42 75,52 Q 85,55 82,68 Q 85,82 72,82 L 32,82 Q 20,82 22,68 Q 20,55 30,55 Z" fill="#ffffff" filter="url(#sfocatura2)" opacity="0.9"/>
                    </svg>
                </div>
                <div id="mini-temp">22°C</div>
            </div>
            <div id="dati-tecnici-box">
                <div class="riga-tecnica"><span>MIN | MAX</span><span>14°C | 26°C</span></div>
                <div class="riga-tecnica"><span>UMIDITÀ | PRESSIONE</span><span>58% | 1014 hPa</span></div>
                <div class="riga-tecnica"><span>PIOGGIA % | VENTO</span><span>10% | 7 KM/H NORD OVEST</span></div>
            </div>
        </div>
    </div>

    <!-- AREA CENTRALE -->
    <div id="main-content">
        <!-- LAYER METEO -->
        <div class="layer active" id="layer-meteo">
            <div id="quadro-meteo">
                <div id="meteo-visual">
                    <div id="svg-meteo-container">
                        <svg viewBox="0 0 100 100" width="100%" height="100%">
                            <defs>
                                <radialGradient id="soleGrad" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#fffb00"/>
                                    <stop offset="30%" stop-color="#ffaa00"/>
                                    <stop offset="100%" stop-color="#ff4500"/>
                                </radialGradient>
                                <filter id="nuvolaSfocata">
                                    <feGaussianBlur stdDeviation="4" />
                                </filter>
                            </defs>
                            <g stroke="#ffaa00" stroke-width="2" stroke-linecap="round">
                                <line x1="50" y1="50" x2="50" y2="10"/>
                                <line x1="50" y1="50" x2="50" y2="90"/>
                                <line x1="50" y1="50" x2="10" y2="50"/>
                                <line x1="50" y1="50" x2="90" y2="50"/>
                                <line x1="50" y1="50" x2="22" y2="22"/>
                                <line x1="50" y1="50" x2="78" y2="78"/>
                                <line x1="50" y1="50" x2="22" y2="78"/>
                                <line x1="50" y1="50" x2="78" y2="22"/>
                            </g>
                            <circle cx="50" cy="50" r="20" fill="url(#soleGrad)"/>
